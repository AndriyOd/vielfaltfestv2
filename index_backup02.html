<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <title>Festival Registration</title>

    <style>
        body {
            font-family: sans-serif;
        }

        /* 🧩 dropdown контейнер */
        .dropdown {
            position: relative;
            width: 340px;
        }

        /* 🔍 input */
        .dropdown-input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        /* 📜 выпадающий список */
        .dropdown-list {
            position: absolute;
            width: 100%;
            background: white;
            border: 1px solid #ccc;

            /* 🔥 ключ: 5-6 элементов + scroll */
            max-height: 180px;
            overflow-y: auto;

            display: none;
            z-index: 10;
        }

        /* 📌 элемент списка */
        .dropdown-item {
            padding: 8px;
            cursor: pointer;
        }

        .dropdown-item:hover {
            background: #eee;
        }
    </style>
</head>

<body>

    <h1>Регистрация гостя</h1>

    <input id="name" placeholder="Имя" />
    <br><br>

    <div class="dropdown">
        <input id="countrySearch" class="dropdown-input" placeholder="Выбери страну..." />
        <div id="countryList" class="dropdown-list"></div>
    </div>

    <br><br>

    <select id="district">
        <option value="North">North</option>
        <option value="South">South</option>
        <option value="East">East</option>
        <option value="West">West</option>
        <option value="Center">Center</option>
    </select>

    <br><br>

    <button onclick="saveGuest()">OK</button>

    <p id="status"></p>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2TQLu_O5U-Jjxj1ArV4Cn79mtjp9cI9k",
            authDomain: "vielfaltfestv2.firebaseapp.com",
            projectId: "vielfaltfestv2",
            storageBucket: "vielfaltfestv2.firebasestorage.app",
            messagingSenderId: "657334897151",
            appId: "1:657334897151:web:f1651bca7dc22f250d3fca"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Переменная для хранения списка стран
        let countries = [];

        // Функция загрузки данных
        async function loadCountries() {
            try {
                const response = await fetch('countries.json');
                countries = await response.json();
            } catch (e) {
                console.error("Ошибка при загрузке списка стран:", e);
            }
        }

        // Запускаем загрузку при старте
        loadCountries();

        // 🇺🇳 emoji-флаг
        function flag(alpha2) {
            return alpha2
                .toUpperCase()
                .replace(/./g, c =>
                    String.fromCodePoint(127397 + c.charCodeAt())
                );
        }

        // =====================
        // 🔍 DROPDOWN LOGIC
        // =====================
        const search = document.getElementById("countrySearch");
        const list = document.getElementById("countryList");
        let selectedCountry = null;

        function renderList(filter = "") {
            list.innerHTML = "";
            const filtered = countries.filter(c =>
                (c.de + c.en + c.alpha3)
                    .toLowerCase()
                    .includes(filter.toLowerCase())
            );

            filtered.forEach(c => {
                const div = document.createElement("div");
                div.className = "dropdown-item";
                div.textContent = `${flag(c.alpha2)} ${c.alpha3} — ${c.de} (${c.en})`;
                div.onclick = () => {
                    search.value = div.textContent;
                    selectedCountry = c.alpha3;
                    list.style.display = "none";
                };
                list.appendChild(div);
            });

            list.style.display = filtered.length ? "block" : "none";
        }

        // Обработчик input
        search.addEventListener("input", () => renderList(search.value));

        // Обработчик click для открытия/очистки
        search.addEventListener("click", () => {
            search.value = "";
            selectedCountry = null;
            renderList("");
        });

        // Закрытие при клике вне области
        document.addEventListener("click", (e) => {
            if (!e.target.closest(".dropdown")) {
                list.style.display = "none";
            }
        });

        // =====================
        // 💾 SAVE
        // =====================
        window.saveGuest = async function () {
            const name = document.getElementById("name").value;
            const district = document.getElementById("district").value;

            if (!selectedCountry) {
                alert("Пожалуйста, выберите страну из списка!");
                return;
            }

            try {
                await addDoc(collection(db, "guests"), {
                    name,
                    country: selectedCountry,
                    district,
                    createdAt: new Date()
                });
                document.getElementById("status").innerText = "Сохранено!";
                // Опционально: очистить форму после успеха
                document.getElementById("name").value = "";
                search.value = "";
            } catch (e) {
                console.error(e);
                document.getElementById("status").innerText = "Ошибка!";
            }
        };
    </script>
    <a href="map.html">Map</a>
</body>

</html>
