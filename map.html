<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <title>Live Map</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #111;
            color: white;
            padding: 20px;
        }

        .counter {
            font-size: 28px;
            margin-bottom: 20px;
        }

        .map-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 800px;
        }

        .district {
            /*background: #2a2a2a;
            padding: 10px;
            border-radius: 8px;
            min-height: 150px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #444;
            overflow-y: auto;*/
            background: #2a2a2a;
            padding: 10px;
            border-radius: 8px;
            min-height: 150px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #444;
            /* Флаги будут выстраиваться красиво в ряд */
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 5px;
        }

        .district h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #aaa;
            width: 100%;
            /* ЭТО КЛЮЧЕВОЕ ИЗМЕНЕНИЕ */
            flex: 0 0 100%;
            /* Дополнительная гарантия того, что заголовок не будет сжиматься */
        }

        .flag {
            font-size: 20px;
            /*display: inline-block;
            margin: 2px;
            display: flex;*/
        }
    </style>
</head>

<body>

    <div class="counter">Всего гостей: <span id="count">0</span></div>

    <div class="map-grid">
        <div id="North" class="district">
            <h3>North</h3>
        </div>
        <div id="West" class="district">
            <h3>West</h3>
        </div>
        <div id="Center" class="district">
            <h3>Center</h3>
        </div>
        <div id="East" class="district">
            <h3>East</h3>
        </div>
        <div id="South" class="district">
            <h3>South</h3>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

        let alpha3ToAlpha2 = {};

        function flagFromAlpha2(a2) {
            return String.fromCodePoint(...[...a2.toUpperCase()].map(c => c.charCodeAt(0) + 127397));
        }

        async function init() {
            try {
                const response = await fetch('countries.json');
                const countries = await response.json();
                countries.forEach(c => alpha3ToAlpha2[c.alpha3] = c.alpha2);
                startFirebase();
            } catch (e) { console.error("Ошибка загрузки стран:", e); }
        }

        function startFirebase() {
            const firebaseConfig = {
                apiKey: "AIzaSyB2TQLu_O5U-Jjxj1ArV4Cn79mtjp9cI9k",
                authDomain: "vielfaltfestv2.firebaseapp.com",
                projectId: "vielfaltfestv2",
                storageBucket: "vielfaltfestv2.firebasestorage.app",
                messagingSenderId: "657334897151",
                appId: "1:657334897151:web:f1651bca7dc22f250d3fca"
            };
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);

            onSnapshot(query(collection(db, "guests"), orderBy("createdAt", "asc")), (snapshot) => {
                const guests = snapshot.docs.map(doc => doc.data());
                document.getElementById("count").innerText = guests.length;

                document.querySelectorAll(".district").forEach(d => {
                    const title = d.querySelector("h3");
                    d.innerHTML = ""; d.appendChild(title);
                });

                /*const lastGuest = guests[guests.length - 1];*/

                // 2. Просто проходим по списку и добавляем флаги один за другим
                // Поскольку массив guests уже отсортирован по createdAt, 
                // порядок добавления сохранится автоматически.
                guests.forEach((g) => {
                    const districtEl = document.getElementById(g.district);
                    if (!districtEl) return;

                    const alpha2 = alpha3ToAlpha2[g.country];
                    if (!alpha2) return;

                    const span = document.createElement("span");
                    span.className = "flag";
                    span.textContent = flagFromAlpha2(alpha2);

                    districtEl.appendChild(span);
                });
            });
        }

        init();
    </script>
    <a href="index.html">Back</a>
</body>

</html>
